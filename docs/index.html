
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매일 외국어 회화</title>
<style>
:root{
  --bg:#f7f7f5; --card:#ffffff; --text:#1a1a1a; --muted:#6b6b6b;
  --line:#e5e5e0; --accent:#4f46e5; --accent-soft:#eef2ff;
  --en:#2563eb; --zh:#dc2626; --ok:#16a34a; --bad:#dc2626;
  --bubbleA:#eef2ff; --bubbleB:#f3f4f6;
  --radius:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#141416; --card:#1e1e21; --text:#f0f0ee; --muted:#a0a0a0;
    --line:#2e2e33; --accent:#818cf8; --accent-soft:#26263a;
    --en:#60a5fa; --zh:#f87171; --ok:#4ade80; --bad:#f87171;
    --bubbleA:#26263a; --bubbleB:#26262a;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;padding-bottom:60px}
.wrap{max-width:640px;margin:0 auto;padding:16px}
header{padding:20px 0 8px}
header h1{font-size:1.35rem;font-weight:800}
header .sub{color:var(--muted);font-size:.85rem;margin-top:2px}

/* 진도율 */
.progress-box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 16px;margin:14px 0;display:flex;flex-direction:column;gap:10px}
.pr-row{display:flex;align-items:center;gap:10px}
.pr-label{font-size:.85rem;font-weight:700;min-width:88px}
.pr-bar{flex:1;height:8px;background:var(--line);border-radius:4px;overflow:hidden}
.pr-fill{height:100%;border-radius:4px;transition:width .5s}
.pr-num{font-size:.78rem;color:var(--muted);min-width:70px;text-align:right;font-variant-numeric:tabular-nums}

/* 탭 */
.tabs{display:flex;gap:6px;margin:10px 0 16px}
.tab{flex:1;padding:10px 0;text-align:center;border-radius:10px;border:1px solid var(--line);
  background:var(--card);font-weight:700;font-size:.9rem;cursor:pointer;color:var(--muted)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* 대화 카드 */
.day-title{font-size:.95rem;font-weight:800;margin:18px 0 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.day-title .badge{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:99px;
  background:var(--accent-soft);color:var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;margin-bottom:10px}
.situation{font-size:1.05rem;font-weight:800;margin-bottom:4px}
.key-expr{font-size:.78rem;color:var(--accent);margin-bottom:12px;font-weight:600}
.bubble-row{display:flex;margin-bottom:10px}
.bubble-row.speakerB{justify-content:flex-end}
.bubble{max-width:82%;padding:10px 12px;border-radius:14px;background:var(--bubbleA)}
.bubble-row.speakerB .bubble{background:var(--bubbleB)}
.bubble .txt{font-size:.98rem;font-weight:600}
.bubble .pinyin{font-size:.82rem;color:var(--accent);font-weight:600;margin-top:2px}
.bubble .ko{font-size:.82rem;color:var(--muted);margin-top:4px}
.bubble .line-audio{margin-top:6px;display:flex;gap:6px}
button.mini-play{border:1px solid var(--line);background:var(--card);color:var(--text);
  border-radius:99px;width:26px;height:26px;font-size:.8rem;cursor:pointer;flex:none}
.audio-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
button.play{border:1px solid var(--line);background:var(--card);color:var(--text);
  border-radius:99px;padding:6px 14px;font-size:.84rem;font-weight:600;cursor:pointer}
button.play:active{background:var(--accent-soft)}
select.opt{border:1px solid var(--line);background:var(--card);color:var(--muted);
  border-radius:8px;padding:5px 6px;font-size:.78rem}
.note{margin-top:10px;font-size:.82rem;color:var(--muted)}
.levelup-banner{background:linear-gradient(90deg,#f59e0b,#ef4444);color:#fff;font-weight:800;
  text-align:center;border-radius:var(--radius);padding:12px;margin:10px 0;font-size:.95rem}

details.arch{margin-bottom:8px;border:1px solid var(--line);border-radius:var(--radius);
  background:var(--card);overflow:hidden}
details.arch>summary{padding:12px 16px;font-weight:700;font-size:.9rem;cursor:pointer;list-style:none;
  display:flex;justify-content:space-between;align-items:center}
details.arch>summary::after{content:"▾";color:var(--muted)}
details.arch[open]>summary::after{content:"▴"}
details.arch .inner{padding:0 12px 12px}
details.arch .card{border:none;border-top:1px solid var(--line);border-radius:0;margin:0}

/* 오늘의 글귀 */
.quote-card{text-align:center;padding:22px 18px}
.quote-flag{font-size:.8rem;font-weight:700;color:var(--accent);margin-bottom:10px}
.quote-text{font-size:1.08rem;font-weight:700;line-height:1.6}
.quote-card .pinyin{font-size:.85rem;color:var(--accent);font-weight:600;margin-top:6px}
.quote-card .ko{font-size:.88rem;color:var(--muted);margin-top:8px}
.quote-source{margin-top:12px;font-size:.78rem;color:var(--muted)}
.empty{color:var(--muted);text-align:center;padding:40px 0;font-size:.9rem}
footer{margin-top:30px;text-align:center;color:var(--muted);font-size:.75rem}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📚 매일 외국어 회화</h1>
    <div class="sub" id="subline">불러오는 중…</div>
  </header>

  <div class="progress-box" id="progressBox" hidden>
    <div class="pr-row">
      <span class="pr-label">🇺🇸 <span id="enLevelName"></span></span>
      <div class="pr-bar"><div class="pr-fill" id="enFill" style="background:var(--en);width:0%"></div></div>
      <span class="pr-num" id="enNum"></span>
    </div>
    <div class="pr-row">
      <span class="pr-label">🇨🇳 <span id="zhLevelName"></span></span>
      <div class="pr-bar"><div class="pr-fill" id="zhFill" style="background:var(--zh);width:0%"></div></div>
      <span class="pr-num" id="zhNum"></span>
    </div>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="en">🇺🇸 영어</button>
    <button class="tab" data-tab="zh">🇨🇳 중국어</button>
    <button class="tab" data-tab="quotes">✨ 오늘의 글귀</button>
  </div>

  <main id="content"><div class="empty">불러오는 중…</div></main>
  <footer>GitHub Actions + Pages로 자동 운영 · 매일 21:00 발송</footer>
</div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const LANGNAME = {en:"영어", zh:"중국어"};
const FLAG = {en:"🇺🇸", zh:"🇨🇳"};
const TTSLANG = {en:"en-US", zh:"zh-CN"};
let ARCHIVE = [], STATE = null, TAB = "en";
const urlDate = new URLSearchParams(location.search).get("d");

/* ---------- 데이터 로드 ---------- */
async function loadData(){
  try{
    const bust = "?" + Date.now();
    const [a,s] = await Promise.all([
      fetch("data/archive.json"+bust).then(r=>r.ok?r.json():[]),
      fetch("data/state.json"+bust).then(r=>r.ok?r.json():null),
    ]);
    ARCHIVE = a; STATE = s;
  }catch(e){ ARCHIVE=[]; STATE=null; }
  renderHeader(); render();
}

function todayKST(){
  const now = new Date(Date.now() + 9*3600*1000);
  return now.toISOString().slice(0,10);
}
function fmtDate(d){
  const [y,m,dd] = d.split("-");
  return `${+m}월 ${+dd}일`;
}
function esc(s){ return String(s??"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---------- 헤더/진도 ---------- */
function renderHeader(){
  if(!ARCHIVE.length){ $("#subline").textContent = "첫 수업을 기다리는 중이에요"; return; }
  const days = STATE && STATE.days ? STATE.days : ARCHIVE.length;
  const learned = STATE ? (STATE.en.learned + STATE.zh.learned) : 0;
  $("#subline").textContent = `${days}일째 학습 중 · 지금까지 대화 ${learned}개`;
  const latest = ARCHIVE[0];
  $("#progressBox").hidden = false;
  for(const lang of ["en","zh"]){
    const sec = latest[lang];
    const pct = sec.total ? Math.round(sec.progress/sec.total*100) : 0;
    $("#"+lang+"LevelName").textContent = sec.done ? "완주 🏆" : sec.level_name;
    $("#"+lang+"Fill").style.width = pct+"%";
    $("#"+lang+"Num").textContent = `${sec.progress}/${sec.total} (${pct}%)`;
  }
}

/* ---------- 오디오 ---------- */
let currentAudio = null;
function stopAudio(){
  if(currentAudio){ currentAudio.pause(); currentAudio = null; }
  speechSynthesis.cancel();
}
function speak(text, lang, rate){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = TTSLANG[lang]; u.rate = rate;
  speechSynthesis.speak(u);
}
function playOne(lang, id, idx, text, rate){
  return new Promise(resolve=>{
    const audio = new Audio(`audio/${lang}/${id}-L${idx}.mp3`);
    audio.playbackRate = rate;
    audio.onended = resolve;
    audio.onerror = ()=>{ speak(text, lang, rate); setTimeout(resolve, Math.min(text.length*90,4000)); };
    currentAudio = audio;
    audio.play().catch(()=>{ speak(text, lang, rate); setTimeout(resolve, Math.min(text.length*90,4000)); });
  });
}
async function playAll(lang, dlg, card){
  stopAudio();
  const rate = parseFloat(card.querySelector(".speed").value);
  const rep  = parseInt(card.querySelector(".repeat").value, 10);
  for(let r=0;r<rep;r++){
    for(let i=0;i<dlg.lines.length;i++){
      await playOne(lang, dlg.id, i, dlg.lines[i].text, rate);
    }
  }
}

/* ---------- 대화 카드 ---------- */
function dialogueHTML(lang, dlg){
  const keyExpr = (dlg.key_expressions||[]).join(" · ");
  const bubbles = dlg.lines.map((ln,i)=>{
    const pinyin = ln.pinyin ? `<div class="pinyin">${esc(ln.pinyin)}</div>` : "";
    return `<div class="bubble-row ${ln.speaker==='B'?'speakerB':''}">
      <div class="bubble" data-idx="${i}">
        <div class="txt">${esc(ln.text)}</div>
        ${pinyin}
        <div class="ko">${esc(ln.ko)}</div>
        <div class="line-audio"><button class="mini-play" data-idx="${i}" title="이 대사만 듣기">🔊</button></div>
      </div>
    </div>`;
  }).join("");
  return `<div class="card" data-id="${dlg.id}">
    <div class="situation">💬 ${esc(dlg.situation)}</div>
    ${keyExpr?`<div class="key-expr">핵심 표현: ${esc(keyExpr)}</div>`:""}
    ${bubbles}
    <div class="audio-row">
      <button class="play" data-act="all">▶ 전체 듣기</button>
      <select class="opt speed" title="재생 속도">
        <option value="1">1.0배속</option><option value="0.85">0.85배속</option><option value="0.7">0.7배속 (쉐도잉)</option>
      </select>
      <select class="opt repeat" title="반복 횟수">
        <option value="1">1회</option><option value="2">2회</option><option value="3">3회</option>
      </select>
    </div>
    ${dlg.note?`<div class="note">💡 ${esc(dlg.note)}</div>`:""}
  </div>`;
}
function bindDialogueCard(card, lang, dlg){
  card.querySelector('[data-act="all"]').onclick = ()=>playAll(lang, dlg, card);
  card.querySelectorAll(".mini-play").forEach(btn=>{
    btn.onclick = ()=>{
      stopAudio();
      const i = parseInt(btn.dataset.idx,10);
      const rate = parseFloat(card.querySelector(".speed").value);
      playOne(lang, dlg.id, i, dlg.lines[i].text, rate);
    };
  });
}

/* ---------- 언어 탭 렌더 ---------- */
function renderLang(lang){
  const c = $("#content");
  if(!ARCHIVE.length){ c.innerHTML = `<div class="empty">아직 학습 기록이 없어요.<br>첫 발송(매일 21:00) 후에 여기에 쌓입니다.</div>`; return; }
  let html = "";
  const [latest, ...past] = ARCHIVE;
  const isToday = latest.date === todayKST();
  const sec = latest[lang];
  html += `<div class="day-title">${fmtDate(latest.date)} ${isToday?'<span class="badge">오늘</span>':""}
           <span class="badge">${esc(sec.level_name)}</span></div>`;
  if(sec.levelup) html += `<div class="levelup-banner">🎉 미션 컴플리트! ${esc(sec.next_level_name)} 레벨로 올라갔어요!</div>`;
  if(sec.done && !sec.items.length) html += `<div class="levelup-banner">🏆 ${LANGNAME[lang]} 전체 완주!</div>`;
  html += sec.items.map(d=>dialogueHTML(lang,d)).join("");
  if(past.length){
    html += `<div class="day-title" style="margin-top:26px">지난 학습</div>`;
    for(const e of past){
      const s = e[lang];
      if(!s || !s.items.length) continue;
      const open = urlDate===e.date ? " open" : "";
      html += `<details class="arch"${open} data-date="${e.date}">
        <summary>${fmtDate(e.date)} · ${esc(s.level_name)} · ${esc(s.items[0].situation)}</summary>
        <div class="inner">${s.items.map(d=>dialogueHTML(lang,d)).join("")}</div>
      </details>`;
    }
  }
  c.innerHTML = html;
  const allDialogues = ARCHIVE.flatMap(e=>e[lang]?e[lang].items:[]);
  c.querySelectorAll(".card").forEach(card=>{
    const dlg = allDialogues.find(d=>d.id===card.dataset.id);
    if(dlg) bindDialogueCard(card, lang, dlg);
  });
  if(urlDate){
    const el = c.querySelector(`[data-date="${urlDate}"]`);
    if(el) el.scrollIntoView({behavior:"smooth"});
  }
}

/* ---------- 오늘의 글귀 (명언·속담·성경구절, 매일 누적) ---------- */
function quoteBodyHTML(entry){
  const q = entry.quote || {};
  let html = "";
  for(const lang of ["en","zh"]){
    const item = q[lang];
    if(!item) continue;
    html += `<div class="card quote-card">
      <div class="quote-flag">${FLAG[lang]} ${LANGNAME[lang]}</div>
      <div class="quote-text">${esc(item.text)}</div>
      ${item.pinyin?`<div class="pinyin">${esc(item.pinyin)}</div>`:""}
      <div class="ko">${esc(item.ko)}</div>
      <div class="quote-source">— ${esc(item.source)}</div>
    </div>`;
  }
  return html;
}
function renderQuotes(){
  const c = $("#content");
  const withQuotes = ARCHIVE.filter(e=>e.quote && (e.quote.en || e.quote.zh));
  if(!withQuotes.length){
    c.innerHTML = `<div class="empty">아직 쌓인 글귀가 없어요.<br>첫 발송(매일 21:00) 후에 여기에 쌓입니다.</div>`;
    return;
  }
  const [latest, ...past] = withQuotes;
  const isToday = latest.date === todayKST();
  let html = `<div class="day-title">${fmtDate(latest.date)} ${isToday?'<span class="badge">오늘</span>':""}</div>`;
  html += quoteBodyHTML(latest);
  if(past.length){
    html += `<div class="day-title" style="margin-top:26px">지난 글귀</div>`;
    for(const e of past){
      html += `<details class="arch" data-date="${e.date}">
        <summary>${fmtDate(e.date)}</summary>
        <div class="inner">${quoteBodyHTML(e)}</div>
      </details>`;
    }
  }
  c.innerHTML = html;
}

/* ---------- 탭 ---------- */
function render(){
  stopAudio();
  if(TAB==="quotes") renderQuotes(); else renderLang(TAB);
}
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    TAB = t.dataset.tab;
    render();
  };
});
loadData();
</script>
</body>
</html>
